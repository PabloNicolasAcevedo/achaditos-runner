name: Scrape prices (sin WhatsApp, mas frecuente)

on:
  schedule:
    - cron: "17 10 * * *"
    - cron: "17 14 * * *"
    - cron: "17 18 * * *"
    - cron: "17 22 * * *"
    - cron: "17 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-brasil-precios
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: PabloNicolasAcevedo/brasil-precios-ba
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run scraper (sin WhatsApp)
        env:
          SKIP_WHATSAPP: "1"
          QUEUE_PG_WRITES: "1"
          PG_INGEST_URL: ${{ secrets.PG_INGEST_URL }}
          PG_INGEST_TOKEN: ${{ secrets.PG_INGEST_TOKEN }}
          EXCHANGE_RATE_URL: ${{ secrets.EXCHANGE_RATE_URL }}
        run: node index.js

      - name: Commit results
        run: |
          git config user.name "brasil-precios-bot"
          git config user.email "actions@users.noreply.github.com"
          bash scripts/commitIngestState.sh "Actualiza estado de ingesta (sin WhatsApp) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
