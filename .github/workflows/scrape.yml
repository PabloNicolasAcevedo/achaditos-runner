name: Scrape Brazilian product prices

on:
  schedule:
    - cron: "17 9 * * *"
    - cron: "17 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scrape-brasil-precios
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: PabloNicolasAcevedo/brasil-precios-ba
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          SKIP_WHATSAPP: "1"
          RUN_KIND: "full"
          QUEUE_PG_WRITES: "1"
          PG_INGEST_URL: ${{ secrets.PG_INGEST_URL }}
          PG_INGEST_TOKEN: ${{ secrets.PG_INGEST_TOKEN }}
          EXCHANGE_RATE_URL: ${{ secrets.EXCHANGE_RATE_URL }}
        run: node index.js

      - name: Commit results
        run: |
          git config user.name "brasil-precios-bot"
          git config user.email "actions@users.noreply.github.com"
          bash scripts/commitIngestState.sh "Actualiza estado de ingesta $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Trigger post-processing
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${{ secrets.PRIVATE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/PabloNicolasAcevedo/brasil-precios-ba/dispatches \
            -d '{"event_type":"full-scrape-complete"}'
