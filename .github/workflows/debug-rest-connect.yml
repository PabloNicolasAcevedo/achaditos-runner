name: "[temporal] Test de conexion REST a Supabase"

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: HTTP reachability al gateway REST (curl)
        run: |
          echo "Probando alcance de red a $SUPABASE_URL/rest/v1/ ..."
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" --max-time 15 "$SUPABASE_URL/rest/v1/" -H "apikey: $SUPABASE_PUBLISHABLE_KEY")
          echo "HTTP status: $code"
          cat /tmp/body.txt

      - name: SELECT real contra una tabla (fetch nativo, sin supabase-js -- evita el crash del cliente Realtime en Node 20)
        run: |
          node -e '
          fetch(process.env.SUPABASE_URL + "/rest/v1/stores?select=id&limit=1", {
            headers: {
              apikey: process.env.SUPABASE_PUBLISHABLE_KEY,
              Authorization: "Bearer " + process.env.SUPABASE_PUBLISHABLE_KEY,
            },
          }).then(async (res) => {
            const body = await res.text();
            console.log("HTTP status:", res.status, res.statusText);
            console.log("Body:", body);
          }).catch((err) => {
            console.log("FALLO DE RED/CONEXION:", err.code || err.message);
          });
          '
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
