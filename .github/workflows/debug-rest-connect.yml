name: "[temporal] Test de conexion REST a Supabase"

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: HTTP reachability al gateway REST (curl, sin supabase-js)
        run: |
          echo "Probando alcance de red a $SUPABASE_URL/rest/v1/ ..."
          code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" --max-time 15 "$SUPABASE_URL/rest/v1/" -H "apikey: $SUPABASE_PUBLISHABLE_KEY")
          echo "HTTP status: $code"
          cat /tmp/body.txt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar supabase-js
        run: npm install @supabase/supabase-js@2

      - name: SELECT vía supabase-js (RLS puede denegar -- lo que importa es si la red conecta)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node -e '
          const { createClient } = require("@supabase/supabase-js");
          const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_PUBLISHABLE_KEY);
          supabase.from("stores").select("id").limit(1).then(({ data, error, status, statusText }) => {
            console.log("HTTP status:", status, statusText);
            if (error) {
              console.log("Error (puede ser RLS, no necesariamente red):", JSON.stringify(error));
            } else {
              console.log("OK, filas:", data.length);
            }
          }).catch((err) => {
            console.log("FALLO DE RED/CONEXION:", err.code || err.message);
          });
          '
